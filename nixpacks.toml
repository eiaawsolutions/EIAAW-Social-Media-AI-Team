# Railway Nixpacks build config — adds the Nix packages we need at runtime
# beyond the auto-detected PHP/Composer stack.
#
# ffmpeg — needed by App\Services\Branding\BrandImageStamper and
# App\Services\Branding\BrandVideoComposer to overlay the EIAAW logo,
# mix voiceover + music, and burn subtitles into video. Without this
# every Designer/Video flow that targets the EIAAW workspace will
# soft-fail to raw FAL output.
#
# fonts-noto + fonts-noto-cjk — FFmpeg's drawtext/subtitles filter loads
# fonts by file path, and Nixpacks's default php image ships no GUI
# fonts. Noto + Noto CJK gives us full Unicode coverage including
# Malay diacritics and CJK characters in case a brand caption ever
# crosses into BM/CN.

[phases.setup]
nixPkgs = [
  "...",
  "ffmpeg-full",
  "noto-fonts",
  "noto-fonts-cjk-sans",
]
