<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" preserveAspectRatio="xMidYMid slice" role="img" aria-label="EIAAW Social Media Team — atmospheric backdrop">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F1A1D"/>
      <stop offset="55%" stop-color="#11766A"/>
      <stop offset="100%" stop-color="#22B8A5"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.3" cy="0.3" r="0.7">
      <stop offset="0%" stop-color="#22B8A5" stop-opacity="0.55"/>
