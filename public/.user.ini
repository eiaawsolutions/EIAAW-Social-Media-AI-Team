; PHP per-directory overrides for the web tier (read by PHP-FPM from the
; document root at runtime — works on Railway's Nixpacks/Railpack buildpack
; without a custom Dockerfile or build config).
;
; WHY: Brand Assets lets users upload images/videos up to 50 MB from their
; desktops. The PHP buildpack default (upload_max_filesize=2M, post_max_size=8M)
; would reject those at the web tier with a 413 BEFORE the request reaches
; Laravel/Livewire — making the upload button look broken in production.
; These limits sit just above the app's 50 MB-per-file rule so a single 50 MB
; file (plus multipart framing) goes through, while still bounding abuse.
;
; Keep in lockstep with:
;   - BrandAssets FileUpload ->maxSize(50 * 1024)  (50 MB)
;   - config/livewire.php temporary_file_upload.rules  (max:51200 KB)

upload_max_filesize = 64M
post_max_size = 72M
max_file_uploads = 25

; Allow a large multipart body + image processing headroom without OOM.
memory_limit = 512M

; A 50 MB upload over a slow mobile uplink needs more than the 60s default.
max_execution_time = 300
max_input_time = 300
