name: CI

# Runs the test suite on every push and PR so guardrails actually gate merges —
# most importantly the tenant-isolation guard (TenantIsolationGuardTest), which
# fails the build if any customer-facing Filament resource ships without
# workspace scoping. Before this workflow the suite only ran when someone
# remembered to run it locally; nothing blocked a cross-tenant leak from merging.
#
# DB ISOLATION (important): the suite is DB-free by design — locally the .env
# points at the Railway PROD database and the sqlite override in phpunit.xml is
# intentionally commented out (see project memory). CI must therefore NEVER see
# prod credentials. We give the app a throwaway in-memory sqlite connection so it
# boots cleanly; because the tests don't hit the DB, that connection is never
# actually queried. No secrets, no prod access, fully hermetic.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

# Cancel an in-flight run for the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: PHPUnit
    runs-on: ubuntu-latest

    env:
      APP_ENV: testing
      APP_DEBUG: "false"
      # Throwaway CI key — NOT a secret. Laravel reads APP_KEY straight from the
      # environment, so we set it here rather than running `php artisan
      # key:generate` (which fails in CI: it tries to write to a .env file that
      # doesn't exist in the repo). This value never touches prod.
      APP_KEY: "base64:AJqYP6VKSNP57+jIuE2bZT5lpPSrfs8YuQCBDLr5bro="
      # Throwaway in-memory DB so the framework resolves a valid connection.
      # The suite is DB-free, so this is never queried — and it carries ZERO
      # prod credentials (the whole point of keeping CI hermetic).
      DB_CONNECTION: sqlite
      DB_DATABASE: ":memory:"
      # Hermetic stubs — keep every external integration inert during tests.
      CACHE_STORE: array
      SESSION_DRIVER: array
      QUEUE_CONNECTION: sync
      MAIL_MAILER: array
      # Infisical resolver MUST stay off in CI — no machine-identity creds here.
      INFISICAL_RESOLVER_ENABLED: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          # Match composer.json require + phpunit needs. Keeps CI parity with
          # the Railway runtime (PHP 8.3) so a passing CI means a deployable app.
          extensions: bcmath, curl, exif, fileinfo, gd, intl, mbstring, openssl, pdo, pdo_sqlite, zip
          coverage: none
          tools: composer:v2

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ runner.os }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run test suite
        # `artisan test` forwards unknown flags to PHPUnit, which rejects
        # --no-interaction; it already runs non-interactively in CI, so omit it.
        run: php artisan test
